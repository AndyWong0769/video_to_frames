name: Build VideoToFrames (macOS DMG · Intel x64)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # Use Rosetta 2 to install Intel Python via /usr/local/ Homebrew
      # so the .app runs on Intel Macs (including VMware VMs).
      # ------------------------------------------------------------------
      - name: Setup Rosetta 2 Intel Homebrew
        run: |
          if [ ! -f /usr/local/bin/brew ]; then
            arch -x86_64 /bin/bash -c \
              "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" \
              < /dev/null || true
          fi
          echo "Intel Homebrew ready"

      - name: Install Intel Python & PyInstaller
        run: |
          arch -x86_64 /bin/bash -c '
            eval "$(/usr/local/bin/brew shellenv)"
            brew install python@3.11 python-tk
            pip3 install --upgrade pip
            pip3 install pyinstaller Pillow
          '

      # ------------------------------------------------------------------
      # Download STATIC ffmpeg/ffprobe from evermeet.cx.
      # These are self-contained x64 binaries — NO dylib dependencies.
      # Runs natively on Intel Macs, and on ARM via Rosetta 2.
      # ------------------------------------------------------------------
      - name: Download static ffmpeg & ffprobe (Intel x64)
        run: |
          echo "Downloading static ffmpeg..."
          curl -L -o ffmpeg.zip "https://evermeet.cx/ffmpeg/getrelease/zip"
          if [ $? -ne 0 ] || ! unzip -o ffmpeg.zip; then
            echo "getrelease/zip failed, trying specific version..."
            curl -L -o ffmpeg.7z "https://evermeet.cx/ffmpeg/ffmpeg-7.1.1.7z"
            7z x ffmpeg.7z -y || true
          fi
          chmod +x ffmpeg
          rm -f ffmpeg.zip ffmpeg.7z

          echo "Downloading static ffprobe..."
          curl -L -o ffprobe.zip "https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip"
          if [ $? -ne 0 ] || ! unzip -o ffprobe.zip; then
            echo "getrelease/ffprobe/zip failed, trying specific version..."
            curl -L -o ffprobe.7z "https://evermeet.cx/ffmpeg/ffprobe-7.1.1.7z"
            7z x ffprobe.7z -y || true
          fi
          chmod +x ffprobe
          rm -f ffprobe.zip ffprobe.7z

          echo "--- ffmpeg ---"
          ./ffmpeg -version 2>&1 | head -1 || echo "(runs via Rosetta on ARM)"
          echo "--- ffprobe ---"
          ./ffprobe -version 2>&1 | head -1 || echo "(runs via Rosetta on ARM)"
          echo "--- file type ---"
          file ffmpeg ffprobe

      # ------------------------------------------------------------------
      # Build Intel .app (no dylib bundling needed — ffmpeg is static!)
      # ------------------------------------------------------------------
      - name: Build Intel macOS App with PyInstaller
        run: |
          arch -x86_64 /bin/bash -c '
            eval "$(/usr/local/bin/brew shellenv)"
            export MACOSX_DEPLOYMENT_TARGET=11.0

            # Verify logo.icns exists (committed in repo)
            ls -la logo.icns

            # --add-binary for static ffmpeg/ffprobe only (no dylibs!)
            pyinstaller --noconsole --windowed --onefile \
              --name "VideoToFrames" \
              --icon="logo.icns" \
              --add-binary "ffmpeg:." \
              --add-binary "ffprobe:." \
              "video_to_frames.py"
          '

      - name: Create DMG
        run: |
          brew install create-dmg
          mkdir -p output
          create-dmg \
            --volname "VideoToFrames" \
            --volicon "logo.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "VideoToFrames.app" 175 190 \
            --hide-extension "VideoToFrames.app" \
            --app-drop-link 425 190 \
            "output/VideoToFrames_Installer.dmg" \
            "dist/VideoToFrames.app"

      - name: Upload DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoToFrames-macOS-DMG
          path: output/*.dmg
